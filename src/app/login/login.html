<div class="login-container">

  <div class="login-bg-accent"></div>

  <mat-card class="login-card">

    <mat-card-header class="login-header">
      <div class="logo-wrapper">
        <img src="logo.jpeg"
             alt="SmartGym Logo"
             class="app-logo"
             (error)="onImgError($event)">
      </div>
      <h1 class="app-name">SmartGym</h1>
      <p class="app-subtitle">Entrenás con inteligencia</p>
    </mat-card-header>

    <mat-card-content class="login-content">

      <div class="stats-row">
        <div class="stat-item">
          <mat-icon class="stat-icon">fitness_center</mat-icon>
          <span class="stat-label">Rutinas</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <mat-icon class="stat-icon">monitor_heart</mat-icon>
          <span class="stat-label">Progreso</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <mat-icon class="stat-icon">emoji_events</mat-icon>
          <span class="stat-label">Logros</span>
        </div>
      </div>

      <button mat-flat-button
              class="login-button"
              (click)="onLogin()"
              [disabled]="isLoading">

        <ng-container *ngIf="!isLoading">
          <mat-icon class="button-icon">login</mat-icon>
          Iniciar sesión
        </ng-container>

        <mat-spinner *ngIf="isLoading" diameter="22" color="accent"></mat-spinner>

      </button>

      <p class="login-footer">
        Al continuar aceptás los términos de uso
      </p>
    </mat-card-content>

  </mat-card>
</div>
